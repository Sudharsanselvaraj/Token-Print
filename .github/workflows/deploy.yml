name: Deploy static site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm run build

      - name: Skip deploy when Pages is disabled
        if: ${{ github.event.repository.has_pages != true }}
        run: echo "GitHub Pages is disabled for this repository; skipping deploy steps."

      # enablement:true turns Pages on (build_type=workflow) the first time this
      # runs, so a fresh clone/fork deploys without a manual Settings → Pages step.
      - uses: actions/configure-pages@v4
        if: ${{ github.event.repository.has_pages == true }}
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        if: ${{ github.event.repository.has_pages == true }}
        with:
          path: frontend/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        if: ${{ github.event.repository.has_pages == true }}
